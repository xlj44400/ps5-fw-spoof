name: Payload

on:
  push:
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - "!**/CMakeLists.txt"
      - ".gitignore"
      - ".idea/**"
      - ".vscode/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - "!**/CMakeLists.txt"
      - ".gitignore"
      - ".idea/**"
      - ".vscode/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.event_name  }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

    - name: Tell tools version
      run: |
        clang -v
        cmake --version
        echo "cwd=${PWD##*/}" >> $GITHUB_ENV

    - name: Set environment variables
      run: echo "PS5_PAYLOAD_SDK=${{ runner.tool_cache }}/opt/ps5-payload-sdk" >> $GITHUB_ENV

    - name: Install PS5 SDK
      run: |
        p="${{ env.PS5_PAYLOAD_SDK }}"
        mkdir -p "$p"
        curl -sL https://github.com/ps5-payload-dev/pacbrew-repo/releases/latest/download/ps5-payload-dev.tar.gz | tar xz -C "$(realpath "$p/../../")"
        ls $p

    - name: Checkout Update PS5 SDK
      uses: actions/checkout@main
      with:
        repository: ps5-payload-dev/sdk
        path: sdk-temp

    - name: Install update PS5 SDK
      run: |
        cd sdk-temp
        make "DESTDIR=${{ env.PS5_PAYLOAD_SDK }}" clean install -j "$(nproc)"

    - name: Checkout Payload
      uses: actions/checkout@main

    - name: Build PS5 Payloads
      run: |
        p="$PWD"
        b="$p/build_ps5"
        $PS5_PAYLOAD_SDK/bin/prospero-cmake -B "$b" -DCMAKE_VERBOSE_MAKEFILE=OFF --fresh
        $PS5_PAYLOAD_SDK/bin/prospero-cmake --build "$b" -j "$(nproc)"

    - name: List build artifacts
      run: |
        echo "Build directory contents:"
        ls -la build_ps5/
        echo "Looking for .elf files:"
        find build_ps5/ -name "*.elf" -type f

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.cwd }}
        path: build_ps5/*.elf
        if-no-files-found: error
        retention-days: 7

    - name: Upload release
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 查找所有.elf文件
        ELF_FILES=$(find build_ps5/ -name "*.elf" -type f)
        if [ -z "$ELF_FILES" ]; then
          echo "No .elf files found to upload!"
          exit 1
        fi
        
        # 创建release（如果不存在）
        gh release create "${{ github.run_id }}" \
          $ELF_FILES \
          --target "${{ github.sha }}" \
          --title "Build ${{ github.run_id }}" \
          --notes "Automated build from commit ${{ github.sha }}" \
          --prerelease || true
